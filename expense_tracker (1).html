<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Expense Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #080b12;
    --surface: #0e1320;
    --surface2: #141927;
    --border: #1e2740;
    --fg: #d4deff;
    --fg-dim: #4a5882;
    --fg-mid: #7a8ab8;
    --accent: #3d6fff;
    --accent2: #00d4aa;
    --danger: #ff4d6d;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(61,111,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(61,111,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  .wrap { max-width: 520px; margin: 0 auto; position: relative; z-index: 1; }

  /* ── Header ── */
  header {
    background: linear-gradient(180deg, #0a0f1e 0%, transparent 100%);
    padding: 24px 20px 0;
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: blur(12px);
  }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 18px; }
  .header-left .eyebrow { font-size: 9px; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; }
  .header-left h1 { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--fg); letter-spacing: -0.5px; }
  .header-right { text-align: right; }
  .header-right .yr-label { font-size: 9px; letter-spacing: 3px; color: var(--fg-dim); text-transform: uppercase; }
  .header-right .yr-total { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: var(--accent2); }

  /* Nav */
  .nav { display: flex; gap: 6px; padding-bottom: 0; }
  .nav-btn {
    flex: 1; padding: 9px 0; border: none; border-radius: 8px 8px 0 0;
    font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700;
    letter-spacing: 1px; cursor: pointer; transition: all 0.2s;
    background: var(--surface); color: var(--fg-dim);
    border: 1px solid var(--border); border-bottom: none;
  }
  .nav-btn.active { background: var(--surface2); color: var(--accent); border-color: var(--accent); }

  /* ── Content ── */
  .content { padding: 16px 16px 80px; background: var(--surface2); border-top: 1px solid var(--accent); min-height: calc(100vh - 130px); }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 12px;
    animation: fadeUp 0.25s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .section-label { font-size: 9px; letter-spacing: 3px; color: var(--fg-dim); text-transform: uppercase; margin-bottom: 10px; }

  /* ── Form ── */
  .field-label { font-size: 9px; letter-spacing: 3px; color: var(--fg-dim); text-transform: uppercase; margin-bottom: 6px; display: block; }
  .field-input {
    width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border);
    color: var(--fg); font-family: 'Space Mono', monospace; font-size: 13px;
    padding: 6px 0 8px; outline: none; transition: border-color 0.2s; margin-bottom: 16px;
  }
  .field-input:focus { border-color: var(--accent); }
  .field-input.big { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; color: var(--accent2); }
  .field-input::placeholder { color: var(--fg-dim); }

  /* Category grid */
  .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
  .cat-btn {
    padding: 10px 4px; border-radius: 10px; border: 2px solid var(--border);
    background: var(--bg); cursor: pointer; font-size: 18px;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    transition: all 0.15s;
  }
  .cat-btn span.cat-name { font-size: 7px; font-family: 'Space Mono', monospace; color: var(--fg-dim); letter-spacing: 1px; }
  .cat-btn.active { border-color: var(--cat-color); background: color-mix(in srgb, var(--cat-color) 15%, transparent); }
  .cat-btn.active span.cat-name { color: var(--cat-color); }

  /* Add button */
  .btn-add {
    width: 100%; padding: 14px; border: none; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), #6d3fff);
    color: #fff; font-family: 'Space Mono', monospace; font-size: 12px;
    font-weight: 700; letter-spacing: 2px; cursor: pointer;
    transition: opacity 0.2s, transform 0.1s; text-transform: uppercase;
  }
  .btn-add:hover { opacity: 0.9; }
  .btn-add:active { transform: scale(0.98); }

  /* ── Expense rows ── */
  .expense-row {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; margin-bottom: 6px;
    animation: fadeUp 0.2s ease both;
  }
  .expense-row .icon { font-size: 20px; margin-right: 10px; }
  .expense-row .info { flex: 1; }
  .expense-row .info .title { font-size: 11px; color: var(--fg); font-weight: 700; }
  .expense-row .info .date { font-size: 9px; color: var(--fg-dim); margin-top: 2px; }
  .expense-row .amount { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 800; margin-right: 10px; }
  .expense-row .del-btn { background: none; border: none; color: var(--border); cursor: pointer; font-size: 14px; transition: color 0.2s; padding: 2px 4px; }
  .expense-row .del-btn:hover { color: var(--danger); }

  /* ── Month nav ── */
  .month-nav { display: flex; align-items: center; justify-content: space-between; }
  .arrow-btn { background: none; border: none; color: var(--fg-mid); font-size: 16px; cursor: pointer; padding: 6px 10px; transition: color 0.2s; }
  .arrow-btn:hover { color: var(--accent); }
  .nav-center { text-align: center; }
  .nav-center .mon-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; }
  .nav-center .mon-total { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--accent2); }

  /* ── Category bars ── */
  .cat-bar-row { margin-bottom: 10px; }
  .cat-bar-meta { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 11px; }
  .cat-bar-track { height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .cat-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }

  /* Filter chips */
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .chip {
    padding: 4px 12px; border-radius: 20px; border: none; font-family: 'Space Mono', monospace;
    font-size: 9px; letter-spacing: 1px; cursor: pointer; background: var(--surface); color: var(--fg-dim);
    transition: all 0.15s; text-transform: uppercase;
  }
  .chip.active { background: var(--accent); color: #fff; }

  /* ── Year bar chart ── */
  .bar-chart { display: flex; align-items: flex-end; gap: 4px; height: 110px; margin-top: 8px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; cursor: pointer; }
  .bar-col:hover .bar-fill { opacity: 0.8; }
  .bar-track { flex: 1; width: 100%; display: flex; align-items: flex-end; }
  .bar-fill { width: 100%; border-radius: 3px 3px 2px 2px; transition: height 0.4s ease; min-height: 0; }
  .bar-col.active .bar-fill { background: linear-gradient(180deg, var(--accent2), var(--accent)) !important; }
  .bar-lbl { font-size: 7px; color: var(--fg-dim); letter-spacing: 0.5px; }
  .bar-col.active .bar-lbl { color: var(--accent); }

  /* Year month list */
  .year-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: opacity 0.15s; }
  .year-row:hover { opacity: 0.7; }
  .year-row .mon-name { font-size: 11px; color: var(--fg-mid); }
  .year-row.active .mon-name { color: var(--fg); font-weight: 700; }
  .year-row .mon-amt { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; color: var(--accent); }
  .year-row .mon-amt.empty { color: var(--fg-dim); }

  .empty-state { text-align: center; padding: 40px 0; color: var(--fg-dim); font-size: 12px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="header-top">
      <div class="header-left">
        <div class="eyebrow">Daily Budget</div>
        <h1>Expense Tracker</h1>
      </div>
      <div class="header-right">
        <div class="yr-label" id="hdr-year">2025</div>
        <div class="yr-total" id="hdr-total">$0.00</div>
      </div>
    </div>
    <div class="nav">
      <button class="nav-btn active" data-view="add" onclick="showView('add')">+ Add</button>
      <button class="nav-btn" data-view="month" onclick="showView('month')">Month</button>
      <button class="nav-btn" data-view="year" onclick="showView('year')">Year</button>
    </div>
  </header>

  <div class="content" id="content"></div>
</div>

<script>
// ── Data ──────────────────────────────────────────────────────────────────────
const CATS = [
  { name:"Food",          icon:"🍜", color:"#FF6B6B" },
  { name:"Transport",     icon:"🚗", color:"#4ECDC4" },
  { name:"Shopping",      icon:"🛍️", color:"#FFE66D" },
  { name:"Health",        icon:"💊", color:"#A8E6CF" },
  { name:"Bills",         icon:"📄", color:"#C7CEEA" },
  { name:"Entertainment", icon:"🎬", color:"#FF8B94" },
  { name:"Other",         icon:"📦", color:"#B5B5B5" },
];
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const MONTHS_SHORT = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

let expenses = JSON.parse(localStorage.getItem("expenses_v1") || "[]");
let selMonth = new Date().getMonth();
let selYear  = new Date().getFullYear();
let currentView = "add";
let filterCat = "All";
let selCat = CATS[0].name;

function save() { localStorage.setItem("expenses_v1", JSON.stringify(expenses)); }
function catOf(name) { return CATS.find(c => c.name === name) || CATS[6]; }

function inMonth(e, m, y) {
  const d = new Date(e.date + "T00:00:00");
  return d.getMonth() === m && d.getFullYear() === y;
}

function fmt(n) { return "Rp " + Math.round(n).toLocaleString("id-ID"); }

// ── Header ────────────────────────────────────────────────────────────────────
function updateHeader() {
  const total = expenses
    .filter(e => new Date(e.date + "T00:00:00").getFullYear() === selYear)
    .reduce((s,e)=>s+e.amount, 0);
  document.getElementById("hdr-year").textContent = selYear;
  document.getElementById("hdr-total").textContent = fmt(total);
}

// ── View router ───────────────────────────────────────────────────────────────
function showView(v) {
  currentView = v;
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.toggle("active", b.dataset.view === v));
  const c = document.getElementById("content");
  c.innerHTML = "";
  if (v === "add")   renderAdd(c);
  if (v === "month") renderMonth(c);
  if (v === "year")  renderYear(c);
  updateHeader();
}

// ── ADD ───────────────────────────────────────────────────────────────────────
function renderAdd(root) {
  const today = new Date().toISOString().split("T")[0];

  const card = el("div","card");

  // Date
  card.append(lbl("Date"));
  const dateIn = inp("date", today); card.append(dateIn);

  // Amount
  card.append(lbl("Amount (Rp)"));
  const amtIn = inp("number", ""); amtIn.classList.add("big"); amtIn.placeholder="0"; card.append(amtIn);

  // Category
  card.append(lbl("Category"));
  const grid = el("div","cat-grid"); card.append(grid);
  const catBtns = {};
  CATS.forEach(c => {
    const b = el("button","cat-btn");
    b.style.setProperty("--cat-color", c.color);
    b.innerHTML = `${c.icon}<span class="cat-name">${c.name.toUpperCase()}</span>`;
    b.onclick = () => { selCat = c.name; Object.values(catBtns).forEach(x=>x.classList.remove("active")); b.classList.add("active"); };
    if (c.name === selCat) b.classList.add("active");
    grid.append(b);
    catBtns[c.name] = b;
  });

  // Note
  card.append(lbl("Note (optional)"));
  const noteIn = inp("text", ""); noteIn.placeholder = "What was this for?"; card.append(noteIn);

  // Add button
  const addBtn = el("button","btn-add"); addBtn.textContent = "Add Expense";
  addBtn.onclick = () => {
    const amt = parseFloat(amtIn.value);
    if (!amt || isNaN(amt)) { amtIn.focus(); return; }
    const dateVal = dateIn.value || today;
    expenses.push({ id: Date.now(), date: dateVal, amount: amt, category: selCat, note: noteIn.value });
    save(); amtIn.value = ""; noteIn.value = "";
    refreshRecent(); updateHeader();
  };
  card.append(addBtn);
  root.append(card);

  // Recent
  const recLabel = el("div","section-label"); recLabel.textContent = "Recent Entries"; root.append(recLabel);
  const recWrap = el("div",""); recWrap.id = "recent-wrap"; root.append(recWrap);
  refreshRecent();

  // Enter key
  [amtIn, noteIn].forEach(x => x.addEventListener("keydown", e => { if(e.key==="Enter") addBtn.click(); }));
}

function refreshRecent() {
  const wrap = document.getElementById("recent-wrap"); if(!wrap) return;
  wrap.innerHTML = "";
  const recent = [...expenses].reverse().slice(0, 6);
  if(!recent.length) { wrap.innerHTML = '<div class="empty-state">No expenses yet. Add your first one!</div>'; return; }
  recent.forEach(e => wrap.append(expenseRow(e)));
}

// ── MONTH ─────────────────────────────────────────────────────────────────────
function renderMonth(root) {
  // Nav
  const navCard = el("div","card");
  const nav = el("div","month-nav");
  const prevBtn = el("button","arrow-btn"); prevBtn.textContent="◀"; prevBtn.onclick = () => { if(selMonth===0){selMonth=11;selYear--;}else selMonth--; showView("month"); };
  const nextBtn = el("button","arrow-btn"); nextBtn.textContent="▶"; nextBtn.onclick = () => { if(selMonth===11){selMonth=0;selYear++;}else selMonth++; showView("month"); };
  const mid = el("div","nav-center");
  const monthly = expenses.filter(e => inMonth(e, selMonth, selYear));
  const mTotal = monthly.reduce((s,e)=>s+e.amount,0);
  mid.innerHTML = `<div class="mon-title">${MONTHS[selMonth]} ${selYear}</div><div class="mon-total">${fmt(mTotal)}</div>`;
  nav.append(prevBtn, mid, nextBtn);
  navCard.append(nav); root.append(navCard);

  // Cat breakdown
  if (monthly.length) {
    const bCard = el("div","card");
    const bl = el("div","section-label"); bl.textContent = "By Category"; bCard.append(bl);
    const catMap = {};
    monthly.forEach(e => catMap[e.category] = (catMap[e.category]||0)+e.amount);
    CATS.filter(c => catMap[c.name]).sort((a,b)=>catMap[b.name]-catMap[a.name]).forEach(c => {
      const pct = (catMap[c.name]/mTotal*100).toFixed(1);
      const row = el("div","cat-bar-row");
      row.innerHTML = `
        <div class="cat-bar-meta">
          <span>${c.icon} ${c.name}</span>
          <span style="color:${c.color};font-weight:700">${fmt(catMap[c.name])}</span>
        </div>
        <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${pct}%;background:${c.color}"></div></div>`;
      bCard.append(row);
    });
    root.append(bCard);
  }

  // Filter chips
  const chips = el("div","chips");
  ["All",...CATS.map(c=>c.name)].forEach(cat => {
    const chip = el("button","chip" + (filterCat===cat?" active":""));
    chip.textContent = cat.toUpperCase();
    chip.onclick = () => { filterCat = cat; showView("month"); };
    chips.append(chip);
  });
  root.append(chips);

  // List
  const filtered = filterCat === "All" ? monthly : monthly.filter(e=>e.category===filterCat);
  if (!filtered.length) {
    const em = el("div","empty-state"); em.textContent = "No expenses this month."; root.append(em);
  } else {
    [...filtered].reverse().forEach(e => root.append(expenseRow(e)));
  }
}

// ── YEAR ──────────────────────────────────────────────────────────────────────
function renderYear(root) {
  // Year nav card
  const navCard = el("div","card");
  const nav = el("div","month-nav");
  const prevBtn = el("button","arrow-btn"); prevBtn.textContent="◀"; prevBtn.onclick=()=>{selYear--;showView("year");};
  const nextBtn = el("button","arrow-btn"); nextBtn.textContent="▶"; nextBtn.onclick=()=>{selYear++;showView("year");};
  const yearTotal = expenses.filter(e=>new Date(e.date+"T00:00:00").getFullYear()===selYear).reduce((s,e)=>s+e.amount,0);
  const avg = yearTotal/12;
  const mid = el("div","nav-center");
  mid.innerHTML = `<div class="mon-title">${selYear}</div><div class="mon-total">${fmt(yearTotal)}</div><div style="font-size:9px;color:var(--fg-dim);margin-top:2px">avg ${fmt(avg)}/mo</div>`;
  nav.append(prevBtn, mid, nextBtn);
  navCard.append(nav); root.append(navCard);

  // Monthly totals
  const monthTotals = MONTHS.map((_,i) =>
    expenses.filter(e=>inMonth(e,i,selYear)).reduce((s,e)=>s+e.amount,0));
  const maxVal = Math.max(...monthTotals, 1);

  // Bar chart
  const chartCard = el("div","card");
  const cl = el("div","section-label"); cl.textContent="Monthly Overview"; chartCard.append(cl);
  const chart = el("div","bar-chart");
  monthTotals.forEach((t, i) => {
    const col = el("div","bar-col" + (i===selMonth?" active":""));
    col.onclick = () => { selMonth=i; showView("month"); };
    const track = el("div","bar-track");
    const fill = el("div","bar-fill");
    const h = t > 0 ? Math.max(3, Math.round((t/maxVal)*86)) : 0;
    fill.style.height = h + "px";
    fill.style.background = i===selMonth ? "" : "var(--border)";
    track.append(fill); col.append(track);
    const lbl2 = el("div","bar-lbl"); lbl2.textContent = ["J","F","M","A","M","J","J","A","S","O","N","D"][i];
    col.append(lbl2); chart.append(col);
  });
  chartCard.append(chart); root.append(chartCard);

  // Month rows
  const listCard = el("div","card");
  const ll = el("div","section-label"); ll.textContent="Month Breakdown"; listCard.append(ll);
  monthTotals.forEach((t, i) => {
    const row = el("div","year-row" + (i===selMonth?" active":""));
    row.onclick = () => { selMonth=i; showView("month"); };
    const mn = el("span","mon-name"); mn.textContent = `${MONTHS[i]} ${selYear}`; row.append(mn);
    const ma = el("span","mon-amt" + (t===0?" empty":"")); ma.textContent = t>0 ? fmt(t) : "—"; row.append(ma);
    listCard.append(row);
  });
  root.append(listCard);
}

// ── Shared: expense row ───────────────────────────────────────────────────────
function expenseRow(e) {
  const cat = catOf(e.category);
  const row = el("div","expense-row");
  const icon = el("span","icon"); icon.textContent = cat.icon; row.append(icon);
  const info = el("div","info");
  const title = el("div","title"); title.textContent = e.note || e.category;
  const date2 = el("div","date"); date2.textContent = e.date;
  info.append(title, date2); row.append(info);
  const amt = el("span","amount"); amt.textContent = fmt(e.amount); amt.style.color = cat.color; row.append(amt);
  const del = el("button","del-btn"); del.textContent = "✕";
  del.onclick = () => { expenses = expenses.filter(x=>x.id!==e.id); save(); showView(currentView); };
  row.append(del);
  return row;
}

// ── Mini helpers ──────────────────────────────────────────────────────────────
function el(tag, cls) { const e=document.createElement(tag); if(cls) e.className=cls; return e; }
function lbl(text) { const l=el("label","field-label"); l.textContent=text.toUpperCase(); return l; }
function inp(type, val) { const i=el("input","field-input"); i.type=type; i.value=val; return i; }

// ── Init ──────────────────────────────────────────────────────────────────────
showView("add");
</script>
</body>
</html>
